# SFT Training Configuration for MultiGEC
# Target hardware: 2x NVIDIA A30 (24GB each)
# Model: Qwen2.5-3B-Instruct with LoRA

model:
  name_or_path: "Qwen/Qwen2.5-3B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

lora:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

data:
  train_file: "processed_data/multigec_train.jsonl"
  val_file: "processed_data/multigec_dev.jsonl"
  max_length: 1024
  # Chat template is handled by the tokenizer

training:
  output_dir: "outputs/sft"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8  # effective batch = 4*2*8 = 64
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 200
  save_strategy: "steps"
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  dataloader_num_workers: 4
  report_to: "wandb"
  run_name: "multigec-sft-qwen2.5-3b"
  deepspeed: "configs/ds_zero2.json"
  seed: 42
